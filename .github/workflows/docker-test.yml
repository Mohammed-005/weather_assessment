name: Docker Build Test

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t tokyo-weather:test .

      - name: Run Container Test
        run: | 
          docker run --rm \
            -e USER_NAME="Github-Actions-Robot" \
            -e ENVIRONMENT="CI-Testing" \ 
            tokyo-weather:test
